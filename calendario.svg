  <text x="333" y="109" text-anchor="middle" font-size="9.5" fill="#5070a0" letter-spacing="1">Segunda</text>
  <rect x="393" y="94" width="96" height="22" rx="11" fill="rgba(181,207,245,0.5)"/>
  <text x="441" y="109" text-anchor="middle" font-size="9.5" fill="#5070a0" letter-spacing="1">Quarta</text>
  <rect x="501" y="94" width="96" height="22" rx="11" fill="rgba(181,207,245,0.5)"/>
  <text x="549" y="109" text-anchor="middle" font-size="9.5" fill="#5070a0" letter-spacing="1">Sexta</text>

