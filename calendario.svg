      <stop offset="0%" stop-color="#fdf6f0"/>
      <stop offset="100%" stop-color="#f0edf8"/>
    </linearGradient>

    <!-- Month header fills — soft pastels -->
    <linearGradient id="gFev" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f9c6d0"/>
      <stop offset="100%" stop-color="#f5afc2"/>
    </linearGradient>
    <linearGradient id="gMar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#aadfcc"/>
      <stop offset="100%" stop-color="#8fd3be"/>
    </linearGradient>
    <linearGradient id="gAbr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fde4a0"/>
      <stop offset="100%" stop-color="#fad47e"/>
    </linearGradient>
    <linearGradient id="gMai" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b5cff5"/>
      <stop offset="100%" stop-color="#c4b8f0"/>
    </linearGradient>
    <linearGradient id="gJun" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7c5e0"/>
      <stop offset="100%" stop-color="#d9b8f0"/>
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
