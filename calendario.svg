  <circle cx="460" cy="330" r="200" fill="rgba(196,184,240,0.06)"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" font-size="10.5" font-weight="600" letter-spacing="5" fill="#a090b8">CALENDÁRIO DE AULAS · 2025</text>
  <text x="450" y="80" text-anchor="middle" font-size="30" font-weight="800" fill="#3d2f5e" letter-spacing="-0.5">Introdução à Computação</text>

  <!-- Subtitle pills -->
